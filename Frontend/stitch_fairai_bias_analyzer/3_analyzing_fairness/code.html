<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analyzing Fairness - FairAI</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface": "#f8f9ff",
                    "secondary": "#0058be",
                    "on-background": "#0b1c30",
                    "surface-container": "#e5eeff",
            }
          },
        },
      }
    </script>
  <style>
    body { font-family: 'Inter', sans-serif; min-height: 100dvh; transition: background-color 0.3s ease; }
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        display: inline-block;
        vertical-align: middle;
    }

    .pulse-ring {
        animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
    }
    @keyframes pulse-ring {
        0% { transform: scale(0.8); opacity: 1; }
        80%, 100% { transform: scale(1.8); opacity: 0; }
    }

    .step-item { transition: all 0.4s ease; }
    .step-item.pending { opacity: 0.4; }

    .progress-bar-fill { transition: width 0.8s ease; }
  </style>
</head>

<body class="bg-surface dark:bg-slate-950 text-on-surface dark:text-slate-200 flex flex-col min-h-screen">

<!-- TopAppBar -->
<header class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center w-full px-6 py-3 sticky z-50 top-0">
    <div class="flex items-center gap-3">
        <span class="material-symbols-outlined dark:text-slate-50">analytics</span>
        <span class="text-xl font-bold tracking-tight text-slate-900 dark:text-slate-50">FairAI</span>
    </div>
    <nav class="hidden md:flex gap-4">
        <span class="text-slate-500 dark:text-slate-400 font-label-md text-label-md px-2 py-1 cursor-pointer" onclick="window.location.href='../1_upload_dataset/code.html'">UPLOAD</span>
        <span class="text-slate-500 dark:text-slate-400 font-label-md text-label-md px-2 py-1 cursor-pointer" onclick="window.location.href='../2_configure_analysis/code.html'">CONFIG</span>
        <span class="text-blue-600 dark:text-blue-400 border-b-2 border-blue-600 font-label-md text-label-md px-2 py-1">ANALYSIS</span>
    </nav>
</header>

<main class="flex-1 flex flex-col items-center justify-center p-8 bg-surface dark:bg-slate-950">
    <div class="max-w-xl w-full text-center space-y-8">

        <!-- Animated Icon -->
        <div class="relative flex items-center justify-center mx-auto w-24 h-24">
            <div class="absolute w-24 h-24 rounded-full bg-secondary dark:bg-blue-500 opacity-20 pulse-ring"></div>
            <div class="w-16 h-16 rounded-full bg-secondary dark:bg-blue-600 flex items-center justify-center shadow-lg">
                <span class="material-symbols-outlined text-white" style="font-size:32px">analytics</span>
            </div>
        </div>

        <!-- Title -->
        <div>
            <h1 class="font-h1 text-h1 text-on-background dark:text-white">Analyzing Fairness</h1>
            <p class="font-body-md text-body-md text-on-surface-variant dark:text-slate-400 mt-2" id="statusMsg">
                Connecting to FairAI engine...
            </p>
        </div>

        <!-- Progress Bar -->
        <div class="w-full bg-slate-200 dark:bg-slate-800 rounded-full h-2 overflow-hidden">
            <div class="progress-bar-fill h-full bg-secondary dark:bg-blue-500 rounded-full shadow-[0_0_8px_rgba(59,130,246,0.5)]" id="progressBar" style="width: 0%"></div>
        </div>
        <p class="font-label-md text-label-md text-on-surface-variant dark:text-slate-500" id="progressPct">0%</p>

        <!-- Steps List -->
        <div class="text-left space-y-4 max-w-sm mx-auto" id="stepsList">
            <div class="step-item pending flex items-center gap-4" id="step1">
                <div class="w-6 h-6 rounded-full border-2 border-slate-300 dark:border-slate-700 flex items-center justify-center flex-shrink-0 transition-colors" id="step1Icon">
                    <div class="w-1.5 h-1.5 bg-slate-400 rounded-full"></div>
                </div>
                <span class="text-sm font-medium dark:text-slate-300">Validating dataset schema</span>
            </div>
            <div class="step-item pending flex items-center gap-4" id="step2">
                <div class="w-6 h-6 rounded-full border-2 border-slate-300 dark:border-slate-700 flex items-center justify-center flex-shrink-0 transition-colors" id="step2Icon">
                    <div class="w-1.5 h-1.5 bg-slate-400 rounded-full"></div>
                </div>
                <span class="text-sm font-medium dark:text-slate-300">Training predictive model</span>
            </div>
            <div class="step-item pending flex items-center gap-4" id="step3">
                <div class="w-6 h-6 rounded-full border-2 border-slate-300 dark:border-slate-700 flex items-center justify-center flex-shrink-0 transition-colors" id="step3Icon">
                    <div class="w-1.5 h-1.5 bg-slate-400 rounded-full"></div>
                </div>
                <span class="text-sm font-medium dark:text-slate-300">Measuring statistical parity</span>
            </div>
            <div class="step-item pending flex items-center gap-4" id="step4">
                <div class="w-6 h-6 rounded-full border-2 border-slate-300 dark:border-slate-700 flex items-center justify-center flex-shrink-0 transition-colors" id="step4Icon">
                    <div class="w-1.5 h-1.5 bg-slate-400 rounded-full"></div>
                </div>
                <span class="text-sm font-medium dark:text-slate-300">Synthesizing AI Audit Report</span>
            </div>
        </div>

        <!-- Error Box -->
        <div id="errorBox" class="hidden p-md bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-xl text-left shadow-sm">
            <div class="flex items-start gap-4">
                <span class="material-symbols-outlined text-red-600 dark:text-red-400">error</span>
                <div>
                    <p class="text-sm font-bold text-red-800 dark:text-red-300 mb-1">Analysis Failed</p>
                    <p class="text-sm text-red-700 dark:text-red-400 leading-relaxed" id="errorMsg"></p>
                    <div class="mt-4 flex gap-3">
                        <button onclick="window.location.href='../2_configure_analysis/code.html'" 
                                class="px-4 py-1.5 bg-red-600 hover:bg-red-700 text-white rounded-lg text-xs font-bold transition-colors shadow-sm">
                            BACK TO CONFIG
                        </button>
                        <button onclick="retryAnalysis()" 
                                class="px-4 py-1.5 border border-red-300 dark:border-red-700 text-red-700 dark:text-red-300 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-lg text-xs font-bold transition-colors">
                            RETRY
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </div>
</main>

<script>
    // Theme setup
    const html = document.documentElement;
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        html.classList.add('dark');
    }

    const API_BASE = "http://127.0.0.1:8000";
    let analysisStarted = false;

    function setStep(stepNum, state) {
        const el = document.getElementById(`step${stepNum}`);
        const icon = document.getElementById(`step${stepNum}Icon`);
        el.classList.remove('pending', 'active', 'done');
        el.classList.add(state);

        if (state === 'done') {
            icon.innerHTML = '<span class="material-symbols-outlined text-white" style="font-size:16px">check</span>';
            icon.className = 'w-6 h-6 rounded-full bg-green-500 dark:bg-green-600 flex items-center justify-center flex-shrink-0 shadow-sm';
        } else if (state === 'active') {
            icon.innerHTML = '<div class="w-3 h-3 border-2 border-blue-600 dark:border-blue-400 border-t-transparent rounded-full animate-spin"></div>';
            icon.className = 'w-6 h-6 rounded-full border-2 border-blue-600 dark:border-blue-400 flex items-center justify-center flex-shrink-0';
        }
    }

    function setProgress(pct, msg) {
        document.getElementById('progressBar').style.width = `${pct}%`;
        document.getElementById('progressPct').textContent = `${pct}%`;
        if (msg) document.getElementById('statusMsg').textContent = msg;
    }

    function showError(msg) {
        document.getElementById('errorBox').classList.remove('hidden');
        document.getElementById('errorMsg').textContent = msg;
        setProgress(0, 'Analysis halted due to error');
    }

    function retryAnalysis() {
        document.getElementById('errorBox').classList.add('hidden');
        runAnalysis();
    }

    async function runAnalysis() {
        const csvData = localStorage.getItem('fairai_csv_data');
        const target = localStorage.getItem('fairai_target');
        const sensitive = localStorage.getItem('fairai_sensitive');
        const filename = localStorage.getItem('fairai_filename') || 'dataset.csv';

        if (!csvData || !target || !sensitive) {
            showError('Missing configuration details. Please return to the Upload page.');
            return;
        }

        setStep(1, 'active');
        setProgress(10, 'Validating dataset consistency...');
        await sleep(800);
        setStep(1, 'done');
        
        setStep(2, 'active');
        setProgress(30, 'Training predictive baseline model...');

        try {
            const blob = new Blob([csvData], { type: 'text/csv' });
            const file = new File([blob], filename, { type: 'text/csv' });
            const formData = new FormData();
            formData.append('file', file);
            formData.append('target', target);
            formData.append('sensitive', sensitive);

            const response = await fetch(`${API_BASE}/analyze`, {
                method: 'POST',
                body: formData
            });

            if (!response.ok) throw new Error(`HTTP Error ${response.status}`);
            const data = await response.json();
            if (data.error) throw new Error(data.error);

            setStep(2, 'done');
            setStep(3, 'active');
            setProgress(60, 'Calculating group-wise selection rates...');
            await sleep(800);
            setStep(3, 'done');

            setStep(4, 'active');
            setProgress(85, 'Finalizing AI-generated audit insights...');
            await sleep(600);
            setStep(4, 'done');
            
            setProgress(100, 'Analysis complete! Viewing results...');
            localStorage.setItem('analysisResult', JSON.stringify(data));
            await sleep(800);
            window.location.href = '../4_analysis_results_insights/code.html';

        } catch (error) {
            console.error(error);
            showError(error.message || 'An unexpected connection error occurred.');
        }
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    window.onload = () => {
        if (!analysisStarted) {
            analysisStarted = true;
            runAnalysis();
        }
    };
</script>

</body>
</html>
